apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: envoy-gateway
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    cluster: management
    app: envoy-gateway
spec:
  project: default
  source:
    chart: gateway-helm
    repoURL: oci://registry-1.docker.io/envoyproxy
    targetRevision: 1.7.1
  destination:
    server: https://kubernetes.default.svc
    namespace: envoy-gateway-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true