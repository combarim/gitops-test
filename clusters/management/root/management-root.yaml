apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: management-root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/combarim/gitops-test.git
    targetRevision: main
    path: clusters/management/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true